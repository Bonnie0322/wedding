<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Nick & Bonnie</title>
    <!-- 載入指定高質感字體 -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a373; /* 莫蘭迪暖陽金色 */
            --secondary: #8da399; /* 莫蘭迪綠 */
            --bg-light: #fdfbf7;
            --text-dark: #4a4a4a;
            --white-glow: rgba(255, 255, 255, 0.88);
            --shadow-soft: 0 15px 35px rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, .en {
            font-family: 'Cormorant Garamond', serif;
        }

        /* 1. 毛玻璃質感固定導航列 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            padding: 18px 0;
        }

        .navbar a {
            color: var(--text-dark);
            text-decoration: none;
            margin: 0 25px;
            font-size: 0.95rem;
            letter-spacing: 2px;
            transition: color 0.3s;
            font-weight: 600;
        }

        .navbar a:hover {
            color: var(--primary);
        }

        /* 3. 全螢幕封面背景 */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.2)), url('https://i.postimg.cc/T1BZGYWG/LINE-ALBUM-qiang-xian-kan-260617-1.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 400;
            margin-bottom: 15px;
            letter-spacing: 6px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .hero p {
            font-size: 1.3rem;
            letter-spacing: 4px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 3. 垂直 V-Card 設計與容器 */
        .section {
            padding: 100px 20px 60px 20px;
            max-width: 750px;
            margin: 0 auto;
        }

        .v-card {
            background: #fff;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(0,0,0,0.01);
            text-align: center;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .section-title span {
            display: block;
            font-size: 1.1rem;
            color: #999;
            letter-spacing: 4px;
            margin-top: 5px;
            font-weight: 400;
        }

        /* 2. 藝術感倒數計時器視覺 */
        .countdown-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
        }

        .countdown-card {
            background: var(--white-glow);
            backdrop-filter: blur(5px);
            border-radius: 14px;
            padding: 20px 0;
            width: 100px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .countdown-number {
            font-size: 2.8rem;
            color: var(--primary);
            font-weight: 300;
            display: block;
            line-height: 1.1;
        }

        .countdown-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
            display: block;
        }

        /* 優雅的垂直細線分隔 */
        .divider-line {
            width: 1px;
            height: 60px;
            background-color: rgba(0, 0, 0, 0.08);
            margin: 0 20px;
        }

        /* 6. 手機版關鍵地點與地址不自動斷行跑版處理 */
        .no-wrap {
            white-space: nowrap;
            display: inline-block;
        }

        /* 7. 交通指引摺疊式面板 (Accordion) */
        .accordion-item {
            border-bottom: 1px solid #f0f0f0;
            text-align: left;
            margin-bottom: 10px;
        }

        .accordion-header {
            padding: 22px 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1.05rem;
            transition: color 0.3s;
            color: #555;
        }

        .accordion-header:hover {
            color: var(--primary);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease-out;
            padding: 0 10px;
            color: #666;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        /* 表單區域設計 */
        .form-group {
            margin-bottom: 28px;
            text-align: left;
        }

        /* 4. 中英雙語標籤 */
        .form-label {
            display: block;
            margin-bottom: 9px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #444;
        }

        .form-label span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            color: var(--primary);
            margin-left: 6px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e2e2e2;
            border-radius: 10px;
            font-family: 'Noto Serif TC', serif;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: #fbfbfb;
            color: var(--text-dark);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 4px 12px rgba(212, 163, 115, 0.08);
        }

        /* 8. 智能表單邏輯初始隱藏 */
        .conditional-field {
            display: none;
            background-color: #faf8f5;
            padding: 20px 20px 5px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px dashed rgba(214, 163, 115, 0.3);
        }

        .btn-submit {
            background-color: var(--secondary);
            color: #fff;
            border: none;
            padding: 16px 50px;
            font-size: 1.05rem;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s;
            font-family: 'Noto Serif TC', serif;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(141, 163, 153, 0.3);
        }

        .btn-submit:hover {
            background-color: #798e85;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(141, 163, 153, 0.4);
        }

        /* 5. 隱藏式 Iframe */
        #hidden_iframe {
            display: none;
        }

        .success-message {
            display: none;
            color: var(--secondary);
            font-size: 1.2rem;
            margin-top: 25px;
            font-weight: 600;
        }

        /* RWD 手機版破版防護優化 */
        @media (max-width: 600px) {
            .hero h1 { font-size: 2.8rem; }
            .countdown-card { width: 70px; padding: 12px 0; }
            .countdown-number { font-size: 1.8rem; }
            .divider-line { margin: 0 8px; height: 45px; }
            .v-card { padding: 35px 20px; }
            .section { padding-top: 80px; }
        }
    </style>
</head>
<body>

    <!-- 1. 固定式毛玻璃導航列 -->
    <nav class="navbar">
        <a href="#about">關於我們</a>
        <a href="#details">婚禮詳情</a>
        <a href="#rsvp">出席回函</a>
    </nav>

    <!-- 3. 全螢幕封面背景 -->
    <header class="hero">
        <h1>Nick & Bonnie</h1>
        <p>Save the Date | 2026.12.12</p>
    </header>

    <!-- 2. 藝術感倒數計時區塊 -->
    <section id="about" class="section">
        <div class="v-card">
            <h2 class="section-title">Wedding Countdown<span>期待見證我們的幸福時刻</span></h2>
            <div class="countdown-container">
                <div class="countdown-card">
                    <span class="countdown-number" id="days">00</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="divider-line"></div>
                <div class="countdown-card">
                    <span class="countdown-number" id="hours">00</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="divider-line"></div>
                <div class="countdown-card">
                    <span class="countdown-number" id="minutes">00</span>
                    <span class="countdown-label">Mins</span>
                </div>
                <div class="divider-line"></div>
                <div class="countdown-card">
                    <span class="countdown-number" id="seconds">00</span>
